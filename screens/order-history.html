<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川島食堂 | 注文履歴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/screens.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button type="button" class="back-btn" id="back-btn" aria-label="戻る">←</button>
      <h1>注文履歴</h1>
    </header>
    <main class="app-main" id="history-main"></main>
  </div>
  <script src="../js/session.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    requireSession('customer');
    document.getElementById('back-btn').addEventListener('click', () => history.back());

    const orders = getOrders();
    const main = document.getElementById('history-main');

    if (orders.length === 0) {
      main.innerHTML = '<p class="empty-note">まだ注文履歴がありません。お店を選んで注文してみましょう。</p>';
    } else {
      main.innerHTML = '<div class="card-list">' + orders.map(o => `
        <a class="card-link" href="order-detail.html?id=${o.id}">
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <p style="margin:0;font-size:13px;font-weight:500;color:var(--ink);">${o.storeName}</p>
              <span class="badge ${statusBadgeClass(o.status)}">${STATUS_LABELS[o.status]}</span>
            </div>
            <p style="margin:6px 0 0;font-size:11px;color:var(--ink-soft);">
              ${new Date(o.createdAt).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })}・¥${o.total.toLocaleString()}
            </p>
          </div>
        </a>
      `).join('') + '</div>';
    }
  </script>
</body>
</html>

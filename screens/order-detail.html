<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川島食堂 | 注文状況</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/screens.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button type="button" class="back-btn" id="back-btn" aria-label="戻る">←</button>
      <h1>注文状況</h1>
      <span class="header-sub" id="order-id"></span>
    </header>
    <main class="app-main" id="detail-main"></main>
  </div>
  <script src="../js/session.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    requireSession('customer');
    document.getElementById('back-btn').addEventListener('click', () => history.back());

    const orderId = new URLSearchParams(location.search).get('id');

    function render() {
      const order = getOrder(orderId);
      const main = document.getElementById('detail-main');
      if (!order) { main.innerHTML = '<p class="empty-note">注文が見つかりません。</p>'; return; }

      document.getElementById('order-id').textContent = '#' + order.id.slice(-4);

      const itemsHtml = order.items.map(i => `
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:4px;">
          <span>${i.name} ×${i.qty}</span><span>¥${(i.price * i.qty).toLocaleString()}</span>
        </div>
      `).join('');

      let stepsHtml;
      if (order.status === 'cancelled') {
        stepsHtml = `<div class="status-step is-cancelled"><div class="dot-track"><div class="dot"></div></div><p class="label">この注文はキャンセルされました</p></div>`;
      } else {
        const currentIdx = STATUS_ORDER.indexOf(order.status);
        stepsHtml = STATUS_ORDER.filter(s => s !== 'pending_payment').map((s, i) => {
          // pending_payment を除いた表示用インデックス
          const realIdx = STATUS_ORDER.indexOf(s);
          const cls = realIdx < currentIdx ? 'is-done' : realIdx === currentIdx ? 'is-current' : '';
          return `<div class="status-step ${cls}">
            <div class="dot-track"><div class="dot"></div><div class="connector"></div></div>
            <p class="label">${STATUS_LABELS[s]}</p>
          </div>`;
        }).join('');
      }

      const canCancel = ['ordered', 'accepted', 'preparing', 'ready'].includes(order.status);

      main.innerHTML = `
        <p class="section-title">${order.storeName}</p>
        <div class="card" style="margin-bottom:16px;">${itemsHtml}
          <div style="border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:var(--ink);">
            <span>合計</span><span>¥${order.total.toLocaleString()}</span>
          </div>
        </div>
        <p class="section-title">配達状況</p>
        <div class="card status-stepper">${stepsHtml}</div>
        ${order.courier ? `<p class="small-note">担当配達員：${order.courier}</p>` : ''}
        ${canCancel ? '<button type="button" class="btn-block btn-outline" id="cancel-btn" style="margin-top:16px;">注文をキャンセルする</button>' : ''}
      `;

      const cancelBtn = document.getElementById('cancel-btn');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          if (confirm('この注文をキャンセルしますか？')) {
            updateOrderStatus(order.id, 'cancelled');
            render();
          }
        });
      }
    }

    render();
    // store/courier側の更新を擬似的にリアルタイム反映（本来はWebSocket購読）
    setInterval(render, 2000);
  </script>
</body>
</html>

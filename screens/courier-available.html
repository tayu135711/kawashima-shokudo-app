<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川島食堂 | 配達可能な注文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/screens.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>配達可能な注文</h1>
      <button type="button" class="logout-btn" id="logout-btn">ログアウト</button>
    </header>
    <main class="app-main">
      <div class="pill-tabs">
        <span class="pill-tab is-active">配達可能一覧</span>
        <a class="pill-tab" href="courier-delivery.html">配達中</a>
      </div>
      <div class="card-list" id="order-list"></div>
    </main>
  </div>
  <script src="../js/session.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    const user = requireSession('courier');
    bindLogout('logout-btn');

    function render() {
      const orders = getOrders().filter(o => o.status === 'ready');
      const list = document.getElementById('order-list');

      if (orders.length === 0) {
        list.innerHTML = '<p class="empty-note">現在、配達可能な注文はありません。</p>';
        return;
      }

      list.innerHTML = orders.map(o => `
        <div class="card">
          <p style="margin:0;font-size:12px;font-weight:500;color:var(--ink);">${o.storeName} → ${o.customerName} 様</p>
          <p style="margin:5px 0 8px;font-size:11px;color:var(--ink-soft);">${o.items.map(i => i.name + ' ×' + i.qty).join('・')}・¥${o.total.toLocaleString()}</p>
          <button type="button" class="btn-block btn-primary btn-sm" data-id="${o.id}">担当する</button>
        </div>
      `).join('');

      list.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          assignCourier(btn.dataset.id, user ? user.name : '配達員');
          window.location.href = 'courier-delivery.html';
        });
      });
    }

    render();
    setInterval(render, 3000);
  </script>
</body>
</html>

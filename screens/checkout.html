<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川島食堂 | お支払い</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/screens.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button type="button" class="back-btn" id="back-btn" aria-label="戻る">←</button>
      <h1>お支払い</h1>
    </header>
    <main class="app-main">
      <div class="card" style="display:flex;justify-content:space-between;font-size:14px;font-weight:500;margin-bottom:18px;">
        <span>お支払い金額</span><span id="total">¥0</span>
      </div>

      <div id="pre-payment">
        <div style="text-align:center;padding:8px 0 18px;">
          <p style="font-size:13px;font-weight:500;color:var(--ink);margin:0 0 6px;">KOMOJU決済ページへ移動します</p>
          <p class="small-note">カード情報の入力・お支払いは外部の安全な決済ページで行われます。決済完了後、自動的にこのアプリへ戻ります。</p>
        </div>
        <button type="button" class="btn-block btn-primary" id="pay-btn">決済ページを開く</button>
      </div>

      <div id="processing" hidden>
        <p style="text-align:center;font-size:13px;color:var(--ink-soft);padding:24px 0;">決済処理中です…</p>
      </div>
    </main>
  </div>
  <script src="../js/session.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    const user = requireSession('customer');
    document.getElementById('back-btn').addEventListener('click', () => history.back());
    document.getElementById('total').textContent = '¥' + cartTotal().toLocaleString();

    document.getElementById('pay-btn').addEventListener('click', () => {
      if (cartLines().length === 0) { alert('カートが空です。'); return; }
      document.getElementById('pre-payment').hidden = true;
      document.getElementById('processing').hidden = false;

      // モック：KOMOJU の決済ページ〜Webhook通知を疑似的に再現
      const order = createOrderFromCart(user ? user.name : 'ゲスト');
      setTimeout(() => {
        // payment.captured Webhook 相当：pending_payment → ordered
        updateOrderStatus(order.id, 'ordered');
        clearCart();
        window.location.href = 'order-detail.html?id=' + order.id;
      }, 1200);
    });
  </script>
</body>
</html>

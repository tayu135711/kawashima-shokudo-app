<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川島食堂 | 店舗一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/screens.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>川島食堂</h1>
      <a href="order-history.html" class="logout-btn" style="text-decoration:none;">注文履歴</a>
      <button type="button" class="logout-btn" id="logout-btn">ログアウト</button>
    </header>
    <main class="app-main">
      <input type="text" class="search-input" id="search" placeholder="お店を検索">
      <div class="card-list" id="store-list"></div>
    </main>
  </div>
  <script src="../js/session.js"></script>
  <script src="../js/mock-data.js"></script>
  <script>
    const user = requireSession('customer');
    bindLogout('logout-btn');

    function render(query) {
      const list = document.getElementById('store-list');
      const filtered = STORES.filter(s => !query || s.name.includes(query));
      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty-note">「' + query + '」に一致するお店が見つかりません。</p>';
        return;
      }
      list.innerHTML = filtered.map(s => `
        <a class="card-link" href="store-detail.html?store=${s.id}">
          <div class="card store-card">
            <div class="thumb accent-${s.accent}"></div>
            <div class="body">
              <p class="name">${s.name}</p>
              <p class="meta">★${s.rating.toFixed(1)}・${s.eta}</p>
            </div>
          </div>
        </a>
      `).join('');
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value.trim()));
    render('');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川島食堂 | ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page">
    <div class="brand-panel">
      <svg class="wave-texture" aria-hidden="true" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
        <defs>
          <pattern id="seigaiha" width="56" height="28" patternUnits="userSpaceOnUse">
            <path d="M0 28 A28 28 0 0 1 28 0 A28 28 0 0 1 56 28" fill="none" stroke="#EDEFEA" stroke-width="1" opacity="0.16"/>
            <path d="M-14 28 A28 28 0 0 1 14 0 A28 28 0 0 1 42 28" fill="none" stroke="#EDEFEA" stroke-width="1" opacity="0.16"/>
          </pattern>
        </defs>
        <rect width="400" height="400" fill="url(#seigaiha)"/>
      </svg>

      <div class="crab-scene" aria-hidden="true">
        <svg viewBox="0 0 220 180" class="crab-svg">
          <g class="claw claw-left">
            <path d="M60 90 C34 82 20 58 30 40 C36 50 48 56 58 58 C50 44 52 28 64 18 C66 34 74 46 84 52" fill="none" stroke="#B8863B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <g class="claw claw-right">
            <path d="M160 90 C186 82 200 58 190 40 C184 50 172 56 162 58 C170 44 168 28 156 18 C154 34 146 46 136 52" fill="none" stroke="#B8863B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <ellipse cx="110" cy="108" rx="58" ry="40" fill="none" stroke="#EDEFEA" stroke-width="4"/>
          <path d="M74 84 Q110 68 146 84" fill="none" stroke="#EDEFEA" stroke-width="3" stroke-linecap="round"/>
          <line x1="58" y1="120" x2="26" y2="112" stroke="#EDEFEA" stroke-width="4" stroke-linecap="round"/>
          <line x1="60" y1="134" x2="30" y2="136" stroke="#EDEFEA" stroke-width="4" stroke-linecap="round"/>
          <line x1="66" y1="146" x2="40" y2="156" stroke="#EDEFEA" stroke-width="4" stroke-linecap="round"/>
          <line x1="162" y1="120" x2="194" y2="112" stroke="#EDEFEA" stroke-width="4" stroke-linecap="round"/>
          <line x1="160" y1="134" x2="190" y2="136" stroke="#EDEFEA" stroke-width="4" stroke-linecap="round"/>
          <line x1="154" y1="146" x2="180" y2="156" stroke="#EDEFEA" stroke-width="4" stroke-linecap="round"/>
          <circle cx="96" cy="96" r="4" fill="#C43E2E"/>
          <circle cx="124" cy="96" r="4" fill="#C43E2E"/>
        </svg>
      </div>
      <h1 class="brand-title">川島食堂</h1>
      <p class="brand-copy">創業以来の味を、そのまま食卓へ。<br>川島食堂自慢のカニ料理をお届けします。</p>
    </div>

    <div class="form-panel">
      <div class="form-card">

        <div class="role-tabs" role="tablist" aria-label="ログインするロールを選択">
          <button type="button" class="role-tab is-active" data-role="customer" role="tab" aria-selected="true">注文する</button>
          <button type="button" class="role-tab" data-role="store" role="tab" aria-selected="false">お店として</button>
          <button type="button" class="role-tab" data-role="courier" role="tab" aria-selected="false">配達員として</button>
          <button type="button" class="role-tab" data-role="admin" role="tab" aria-selected="false">管理者</button>
        </div>

        <div class="mode-switch">
          <button type="button" class="mode-btn is-active" data-mode="login">ログイン</button>
          <button type="button" class="mode-btn" data-mode="register">新規登録</button>
        </div>

        <form id="auth-form" novalidate>
          <div class="field name-field" hidden>
            <label for="name">お名前</label>
            <input type="text" id="name" name="name" autocomplete="name" placeholder="山田 太郎">
          </div>

          <div class="field">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required>
          </div>

          <div class="field">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="8文字以上" required minlength="8">
          </div>

          <p class="form-error" id="form-error" role="alert" hidden></p>

          <button type="submit" class="submit-btn" id="submit-btn">注文する人としてログイン</button>
        </form>

        <p class="switch-hint" id="switch-hint">
          アカウントをお持ちでない方は
          <button type="button" class="link-btn" id="switch-to-register">新規登録</button>
        </p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
